<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>❤️ 我們的專屬時光 ❤️</title>
    <style>
        :root {
            --bg: #ffe6e6; --card: rgba(255, 255, 255, 0.95);
            --text: #333; --pink: #ff4d6d; --accent: #ffb3c1;
        }
        [data-theme="dark"] {
            --bg: #121212; --card: rgba(30, 30, 30, 0.98);
            --text: #f0f0f0; --pink: #ff758f; --accent: #ffccd5;
        }

        * { box-sizing: border-box; transition: all 0.3s ease; font-family: "Microsoft JhengHei", sans-serif; }
        body {
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            background-color: var(--bg); overflow: hidden; position: relative;
        }

        /* 右側計時器側邊欄 */
        #timer-sidebar {
            position: fixed; left: -250px; top: 50%; transform: translateY(-50%);
            width: 220px; background: var(--card); padding: 20px;
            border-radius: 0 20px 20px 0; border: 2px solid var(--pink);
            box-shadow: 5px 0 15px rgba(0,0,0,0.1); z-index: 1000;
            display: none; /* 登入後顯示 */
        }
        #timer-sidebar.active { left: 0; }
        .timer-title { color: var(--pink); font-size: 0.9rem; font-weight: bold; margin-bottom: 10px; }
        #timer-display { font-size: 0.85rem; line-height: 1.6; color: var(--text); }

        /* 頂部選單 */
        #top-bar { position: fixed; top: 15px; right: 15px; display: flex; gap: 10px; z-index: 1100; }
        .control-el { background: var(--card); border: 1px solid var(--pink); border-radius: 10px; padding: 5px; color: var(--text); }

        /* 卡片統一樣式 */
        .card {
            background: var(--card); padding: 30px; border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            text-align: center; z-index: 100; width: 90%; max-width: 360px;
            border: 2px solid var(--pink); position: relative;
        }
        h1 { color: var(--pink); font-size: 1.2rem; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #ddd; outline: none; background: var(--bg); color: var(--text); }
        .btn { padding: 12px 20px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-main { background: var(--pink); color: white; }
        .btn-link { background: none; color: var(--pink); text-decoration: underline; font-size: 0.8rem; }

        /* 告白按鈕組 */
        .btn-group { display: flex; gap: 10px; height: 50px; }
        #no-btn { background: #ccc; color: #555; position: fixed; width: auto; z-index: 2000; }

        /* 愛心背景 */
        .heart { position: fixed; color: var(--pink); pointer-events: none; animation: floatUp linear infinite; z-index: 1; }
        @keyframes floatUp { 0% { transform: translateY(110vh); opacity: 1; } 100% { transform: translateY(-10vh); opacity: 0; } }

        /* 詩篇畫面 */
        #poem-screen {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 3000; overflow-y: auto; padding: 60px 20px; text-align: center;
        }
        .poem-line { color: var(--accent); display: block; margin-bottom: 15px; opacity: 0; animation: fadeIn 1s forwards; font-size: 1.1rem; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body data-theme="light">

    <div id="top-bar">
        <select id="lang-sel" class="control-el">
            <option value="tc">繁體中文</option>
            <option value="en">English</option>
        </select>
        <button class="control-el" onclick="toggleTheme()">🌓 Theme</button>
    </div>

    <div id="timer-sidebar">
        <div class="timer-title">❤️ 我們在一起已經...</div>
        <div id="timer-display">載入中...</div>
    </div>

    <div id="reg-box" class="card">
        <h1>建立專屬帳號</h1>
        <input type="text" id="reg-user" placeholder="設定使用者名稱">
        <input type="password" id="reg-pass" placeholder="設定密碼">
        <input type="date" id="start-date" title="選擇在一起的日期">
        <button class="btn btn-main" onclick="handleRegister()">註冊並設定日期</button>
        <button class="btn btn-link" onclick="switchCard('login')">已有帳號？登入</button>
    </div>

    <div id="login-box" class="card" style="display:none;">
        <h1>秘密基地登入</h1>
        <input type="text" id="log-user" placeholder="使用者名稱">
        <input type="password" id="log-pass" placeholder="密碼">
        <button class="btn btn-main" onclick="handleLogin()">進入心門</button>
        <button class="btn btn-link" onclick="switchCard('reg')">還沒帳號？註冊</button>
    </div>

    <div id="gender-box" class="card" style="display:none;">
        <h1 id="t-gender">妳/他是...</h1>
        <button class="btn btn-main" style="background:#4a90e2" onclick="startPro('Gay')">男生</button>
        <button class="btn btn-main" onclick="startPro('T')">女生</button>
    </div>

    <div id="pro-box" class="card" style="display:none;">
        <h1 id="t-pro">妳願意跟我在一起嗎？</h1>
        <div class="btn-group">
            <button class="btn btn-main" onclick="showPoem()">同意</button>
            <button id="no-btn" class="btn">不同意</button>
        </div>
    </div>

    <div id="poem-screen">
        <div id="poem-content"></div>
    </div>

    <script>
        let currentUser = null;
        let timerInterval = null;

        // --- 核心功能：註冊登入 ---
        function switchCard(type) {
            document.getElementById('reg-box').style.display = type === 'reg' ? 'block' : 'none';
            document.getElementById('login-box').style.display = type === 'login' ? 'block' : 'none';
        }

        function handleRegister() {
            const user = document.getElementById('reg-user').value;
            const pass = document.getElementById('reg-pass').value;
            const date = document.getElementById('start-date').value;
            if(!user || !pass || !date) return alert("請填寫完整資訊！");

            const userData = { user, pass, date };
            localStorage.setItem(`user_${user}`, JSON.stringify(userData));
            alert("註冊成功！請登入。");
            switchCard('login');
        }

        function handleLogin() {
            const user = document.getElementById('log-user').value;
            const pass = document.getElementById('log-pass').value;
            const stored = localStorage.getItem(`user_${user}`);

            if(stored) {
                const data = JSON.parse(stored);
                if(data.pass === pass) {
                    currentUser = data;
                    startApp();
                    return;
                }
            }
            alert("帳號或密碼錯誤！");
        }

        // --- 核心功能：計時器 ---
        function startApp() {
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('gender-box').style.display = 'block';
            
            // 啟動計時器側邊欄
            const sidebar = document.getElementById('timer-sidebar');
            sidebar.style.display = 'block';
            setTimeout(() => sidebar.classList.add('active'), 100);
            
            updateTimer();
            timerInterval = setInterval(updateTimer, 1000);
        }

        function updateTimer() {
            const start = new Date(currentUser.date);
            const now = new Date();
            const diff = now - start;

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const mins = Math.floor((diff / 1000 / 60) % 60);
            const secs = Math.floor((diff / 1000) % 60);

            document.getElementById('timer-display').innerHTML = `
                <b>${days}</b> 天<br>
                <b>${hours}</b> 小時<br>
                <b>${mins}</b> 分鐘<br>
                <b>${secs}</b> 秒
            `;
        }

        // --- 告白邏輯 ---
        function startPro(label) {
            document.getElementById('gender-box').style.display = 'none';
            document.getElementById('pro-box').style.display = 'block';
        }

        // 按鈕逃跑邏輯 (強化邊界檢查)
        const noBtn = document.getElementById('no-btn');
        noBtn.onmouseover = noBtn.ontouchstart = function(e) {
            e.preventDefault();
            const pad = 60;
            const maxX = window.innerWidth - noBtn.offsetWidth - pad;
            const maxY = window.innerHeight - noBtn.offsetHeight - pad;
            noBtn.style.left = Math.max(pad, Math.random() * maxX) + 'px';
            noBtn.style.top = Math.max(pad, Math.random() * maxY) + 'px';
        };

        function showPoem() {
            document.getElementById('pro-box').style.display = 'none';
            document.getElementById('timer-sidebar').style.zIndex = "4000"; // 詩篇出現時計時器依然可見
            const screen = document.getElementById('poem-screen');
            screen.style.display = 'block';
            
            const poemLines = [
                `親愛的 ${currentUser.user}，`,
                `自從 ${currentUser.date} 那天起，`,
                `我的世界多了一個你。`,
                `我們一起走過了 ${Math.floor((new Date() - new Date(currentUser.date))/(1000*60*60*24))} 天。`,
                `這不是一段終點，`,
                `而是我們故事的序章。`,
                `我會一直在你身後，`,
                `像計時器一樣，秒秒守護你。`,
                `我愛你。 ❤️`
            ];
            
            let i = 0;
            function typeLine() {
                if(i < poemLines.length) {
                    const el = document.createElement('span');
                    el.className = 'poem-line';
                    el.innerText = poemLines[i];
                    document.getElementById('poem-content').appendChild(el);
                    screen.scrollTo({ top: screen.scrollHeight, behavior: 'smooth' });
                    i++;
                    setTimeout(typeLine, 1500);
                }
            }
            typeLine();
        }

        // --- 其他工具 ---
        function toggleTheme() {
            const b = document.body;
            b.setAttribute('data-theme', b.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        }

        setInterval(() => {
            const h = document.createElement('div');
            h.className = 'heart';
            h.innerHTML = '❤️';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.fontSize = (Math.random() * 15 + 10) + 'px';
            h.style.animationDuration = (Math.random() * 3 + 5) + 's';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 7000);
        }, 600);
    </script>
</body>
</html>
