    <title>來自心底的告白 ❤️ From the Heart</title>
    <style>
        :root {
            /* 淺色模式變數 */
            --bg-color: #ffe6e6;
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-color: #333;
            --main-pink: #ff4d6d;
            --sub-text: #888;
            --btn-gray-bg: #f0f0f0;
            --poem-text-color: #ffb3c1;
            --settings-bg: rgba(255, 255, 255, 0.8);
        }

        [data-theme="dark"] {
            /* 深色模式變數 */
            --bg-color: #1a1a1a;
            --card-bg: rgba(40, 40, 40, 0.95);
            --text-color: #f0f0f0;
            --main-pink: #ff758f;
            --sub-text: #aaa;
            --btn-gray-bg: #444;
            --poem-text-color: #ffccd5;
            --settings-bg: rgba(0, 0, 0, 0.5);
        }

        * { box-sizing: border-box; touch-action: manipulation; transition: background-color 0.3s, color 0.3s; }
        
        body {
            margin: 0; padding: 0; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background-color: var(--bg-color);
            font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* 設置面板 (語言和主題) */
        #settings-bar {
            position: fixed; top: 10px; right: 10px;
            display: flex; gap: 8px; z-index: 1000;
            padding: 5px; border-radius: 20px;
            background-color: var(--settings-bg);
            backdrop-filter: blur(5px);
        }
        .icon-btn {
            background: none; border: none; font-size: 1.2rem; cursor: pointer; padding: 5px; opacity: 0.7;
        }
        .icon-btn:hover { opacity: 1; }
        #lang-select {
            background: none; border: none; color: var(--text-color);
            font-size: 0.9rem; cursor: pointer; outline: none;
        }

        /* 背景愛心樣式 */
        .bg-heart {
            position: absolute; color: var(--main-pink); opacity: 0;
            user-select: none; pointer-events: none;
            animation: floatHeart linear infinite;
        }
        @keyframes floatHeart {
            0% { transform: translateY(0) scale(0); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-100vh) scale(1.2); opacity: 0; }
        }

        /* 對話框樣式 */
        .card {
            background-color: var(--card-bg);
            padding: 30px; border-radius: 25px;
            box-shadow: 0 15px 35px rgba(255, 100, 100, 0.15);
            text-align: center; z-index: 10;
            width: 85%; max-width: 400px;
            display: none;
            backdrop-filter: blur(10px);
        }

        h1 { color: var(--main-pink); font-size: 1.4rem; margin-bottom: 30px; line-height: 1.5; }

        .btn-container { display: flex; justify-content: space-around; align-items: center; gap: 15px; position: relative; height: 60px; }

        button.main-btn {
            padding: 12px 20px; font-size: 1.1rem; border: none;
            border-radius: 50px; cursor: pointer; font-weight: bold;
            transition: transform 0.1s, left 0.3s ease-out, top 0.3s ease-out, background-color 0.3s;
        }

        .btn-yes { background-color: var(--main-pink); color: white; box-shadow: 0 4px 15px rgba(255, 77, 109, 0.3); }
        .btn-yes:hover { transform: scale(1.05); }
        .btn-boy { background-color: #4a90e2; color: white; box-shadow: 0 4px 15px rgba(74, 144, 226, 0.3); }
        .btn-gray { background-color: var(--btn-gray-bg); color: var(--sub-text); }

        /* 煙火 Canvas */
        #fireworks {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #0a0a0a; display: none; z-index: 1;
        }

        /* 浪漫長詩容器 */
        #poem-container {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 100;
            background: rgba(0, 0, 0, 0.85);
            color: white; overflow-y: auto; padding: 60px 25px;
            text-align: center; scroll-behavior: smooth;
        }

        .poem-content {
            font-size: 1.1rem; line-height: 2.3;
            color: var(--poem-text-color);
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.4);
            max-width: 600px; margin: 0 auto;
        }
        .poem-line {
            opacity: 0; transform: translateY(10px);
            animation: typeIn 0.5s forwards;
            margin-bottom: 10px;
            display: block;
        }
        @keyframes typeIn {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>

                proposalTitle: "付き合ってくれる？", yesBtn: "はい", noBtn: "いいえ",
                trapAreYouSure: "本当？", trapLabelT: "「T」だけが「いいえ」を押す", trapLabelGay: "「ゲイ」だけが「いいえ」を押す",
                poem: [`今日の太陽は格別に輝いている。`, `ついに手を繋いだから。`, `何度も探り合った街を歩き、`, `この確かな抱擁の瞬間を迎えた。`, `あなたの名前は私の唯一となり、`, `残りの人生をあなたと過ごしたい。`, `もう一人で歩くことはない。`, `街角のすべてにあなたの体温を感じる。`, `私の世界に来てくれてありがとう。`, `平凡な四季を彩ってくれた。`, `一緒に成長しようと約束した。`, `木のようにしっかりと守り抜くと。`, `未来の風雨がどんなに強くても、`, `私があなたの最も暖かい港になる。`, `言葉にできなかった鼓動が、`, `今日、ついにこだまとなった。`, `あなたの笑顔が最も心を動かす、`, `今まで見た中で最も美しい景色だ。`, `あなたの手を私のポケットに入れ、`, `最もリアルな依存を感じて。`, `この得がたい愛を祝おう、`, `一生をかけて育む価値がある。`, `朝食は熱々のものを二つ。`, `夕食はあなたと面白いニュースを共有しよう。`, `あなたの少しのわがままも好きだ、`, `それは私への無防備さだから。`, `あなたの趣味をすべて覚えるよ。`, `あなたの心の中で誇りになれるように。`, `私たちの愛の言葉が常に新鮮でありますように、`, `出会った時のように清らかで甘く。`, `映画の半券は小さな秘密を収集している、`, `私たちが近づいた軌跡を記録している。`, `カフェの隅は相変わらず静かで、`, `私たちの愛の誕生を見守った。`, `世界は常に回り続けているけれど、`, `私の視線はあなただけのために留まる。`, `未来の青写真はすべてあなただ、`, `一筆一筆が甘さで満たされている。`, `出会えた縁に感謝する。`, `この後悔をこの世に残さなかったことに。`, `一緒に世界を旅しよう、`, `有名な名山や大川を見て回ろう。`, `ソファで一緒にドラマを見よう、`, `最も平凡な朝と夜を過ごそう。`, `生活には避けられない摩擦もある、`, `コミュニケーションが私たちの最良の解決策だ。`, `喧嘩の後も抱きしめることを忘れないで、` , `冷戦が情熱を消費してしまわないように。`, `あなたの幸せが私の追求だ、`, `この初心は永遠に錆びない。`, `星空の下でした願い事が、`, `一歩ずつ生活の中で体現されている。`, `ほら、月も笑っている、`, `お互いの支えを見つけたことを祝っている。`, `悲しみは過ぎ去った歳月に残し、`, `優しさをすべて今夜に残そう。`, `私たちはお互いの最高のパズル、`, `合わさって初めて完璧な地図になる。`, `この奇妙な化学反応を大切にしよう、`, `それは人生で最も美しい贈り物だ。`, `豪華な儀式は必要ない、`, `あなたがいれば、それが最高のことだ。`, `シンプルな「会いたい、愛している」、`, `すべての甘い言葉に勝る。`, `あなたと一緒にゆっくり老いていきたい、`, `鏡の中のシワが増えるのを見よう。`, `その時もまだあなたの手を握り、`, `かつての街角を歩いている。`, `愛は長く続くマラソンだ、`, `私は常にあなたの後ろを走る。`, `疲れたら私の肩に寄りかかって、`, `私はすべての悲しみを遮る。`, `あなたの優しさが愛する理由、`, `あなたの勇気が私をもううつむかせない。`, `毎日、昨日よりも多く、`, `より多くの愛が心にひらめく。`, `これは私たちの愛の第何章だろう、`, `すべてのページが金色に輝いている。`, `誰かの模範になる必要はない、`, `私たちが十分に輝いていれば。`, `あなたを守ることが私の残りの人生の責任、`, `あなたを愛おしむことが私の最大の幸福。`, `カップルという呼び名はなんと心地よい、`, `永遠の交響曲のようだ。`, `独身との正式な別れを祝おう、`, `希望に満ちた新しい人生を迎えよう。`, `この喜びを空と共有しよう、`, `雲が甘さを夢に運ぶように。`, `未来の道を私たちは並んで進む、`, `離れず見捨てずが最初の約束。`, `毎日あなたが笑顔でいられますように、`, `すべての悩みが風と共に消えますように。`, `すべての一行の文字が本心を表し、`, `すべての感情が深く刻まれている。`, `一緒に新しい章を書こう、`, `愛が時の中で永遠に続きますように。`, `百行の詩では私の心を表しきれない、`, `行動だけであなたを愛していることを証明する。`, `私たちがパートナーになったことを再び祝う、`, `この人生を共に、永遠に離れない。 ❤️`]
            }
        };

        // --- 核心變數 ---
        let currentLang = 'zh-TW';
        let userGender = ""; 
        let userLabel = ""; // T 或 Gay
        const elements = {
            genderBox: document.getElementById('gender-box'),
            proposalBox: document.getElementById('proposal-box'),
            confirmBox: document.getElementById('confirm-box'),
            trapText: document.getElementById('trap-text'),
            fireworksCanvas: document.getElementById('fireworks'),
            poemContainer: document.getElementById('poem-container'),
            poemTextArea: document.getElementById('poem-text'),
            noBtn: document.getElementById('no-btn-1'),
            heartContainer: document.getElementById('heart-container'),
            langSelect: document.getElementById('lang-select'),
            themeToggle: document.getElementById('theme-toggle')
        };

        // --- 初始化 (語言, 主題, 愛心) ---
        function init() {
            updateLanguage();
            // 自動生成背景愛心
            for(let i=0; i<15; i++) { setTimeout(createHeart, i * 300); }
            setInterval(createHeart, 800); // 持續生成
        }

        // --- 設置功能 (語言/主題) ---
        elements.langSelect.addEventListener('change', (e) => {
            currentLang = e.target.value;
            updateLanguage();
        });

        elements.themeToggle.addEventListener('click', () => {
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            elements.themeToggle.innerText = isDark ? '☀️' : '🌙';
        });

        function updateLanguage() {
            // 更新所有靜態 data-i18n 元素
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                el.innerText = i18n[currentLang][key];
            });
            // 處理陷阱動態文字
            if (confirmBox.style.display === 'block') {
                updateTrapText();
            }
        }

        // --- 背景愛心動畫 ---
        function createHeart() {
            // 在長詩出現時停止生成
            if(elements.poemContainer.style.display === 'block') return;

            const heart = document.createElement('div');
            heart.classList.add('bg-heart');
            heart.innerText = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = (100 + Math.random() * 20) + 'vh'; // 從螢幕下方開始
            
            // 隨機大小、透明度、速度
            const size = (0.8 + Math.random() * 1.5) + 'rem';
            heart.style.fontSize = size;
            heart.style.opacity = 0.4 + Math.random() * 0.4;
            
            const duration = (6 + Math.random() * 6) + 's';
            heart.style.animationDuration = duration;

            elements.heartContainer.appendChild(heart);
            // 動態結束後移除元素
            setTimeout(() => heart.remove(), parseInt(duration) * 1000);
        }

        // --- 流程邏輯 ---
        // 1. 選擇性別
        document.getElementById('boy-btn').onclick = () => { 
            userLabel = i18n[currentLang].trapLabelGay; 
            showProposal(); 
        };
        document.getElementById('girl-btn').onclick = () => { 
            userLabel = i18n[currentLang].trapLabelT; 
            showProposal(); 
        };

        function showProposal() {
            elements.genderBox.style.display = 'none';
            elements.proposalBox.style.display = 'block';
        }

        // 2. 逃跑機制 (不同意按鈕)
        function moveNoBtn() {
            const maxX = window.innerWidth - elements.noBtn.offsetWidth - 20;
            const maxY = window.innerHeight - elements.noBtn.offsetHeight - 20;
            elements.noBtn.style.position = 'fixed';
            elements.noBtn.style.left = Math.max(10, Math.random() * maxX) + 'px';
            elements.noBtn.style.top = Math.max(10, Math.random() * maxY) + 'px';
        }

        elements.noBtn.addEventListener('mouseover', moveNoBtn);
        elements.noBtn.addEventListener('touchstart', (e) => { e.preventDefault(); moveNoBtn(); });

        // 3. 陷阱：真的點到不同意
        elements.noBtn.onclick = () => {
            elements.proposalBox.style.display = 'none';
            updateTrapText();
            elements.confirmBox.style.display = 'block';
        };

        function updateTrapText() {
            const areYouSure = i18n[currentLang].trapAreYouSure;
            elements.trapText.innerHTML = `${areYouSure}<br><span style="color:red; font-size:1.6rem;">${userLabel}</span>`;
        }

        // 4. 同意與最後慶祝
        document.getElementById('yes-btn-1').onclick = startCelebration;
        document.getElementById('yes-btn-2').onclick = startCelebration;

        function startCelebration() {
            // 隱藏所有卡片和設置列
            elements.proposalBox.style.display = 'none';
            elements.confirmBox.style.display = 'none';
            document.getElementById('settings-bar').style.display = 'none';
            
            elements.fireworksCanvas.style.display = 'block';
            elements.poemContainer.style.display = 'block';
            startFireworks();
            startPoemTypewriter();
        }

        // --- 打字機長詩動畫 ---
        function startPoemTypewriter() {
            const poemLines = i18n[currentLang].poem;
            let currentLine = 0;
            
            // 清空區域
            elements.poemTextArea.innerHTML = "";

            // 遞迴函式，一行行顯示
            function typeNextLine() {
                if (currentLine < poemLines.length) {
                    const span = document.createElement('span');
                    span.classList.add('poem-line');
                    span.innerText = poemLines[currentLine];
                    elements.poemTextArea.appendChild(span);
                    
                    // 自動往下捲動
                    elements.poemContainer.scrollTop = elements.poemContainer.scrollHeight;
                    
                    currentLine++;
                    // 設定每一行出現的間隔時間 (例如 1.8 秒)
                    setTimeout(typeNextLine, 1800); 
                }
            }
            
            // 延遲一點點開始
            setTimeout(typeNextLine, 1000);
        }

        // --- 煙火程式碼 (Canvas) ---
        function startFireworks() {
            const ctx = elements.fireworksCanvas.getContext('2d');
            elements.fireworksCanvas.width = window.innerWidth;
            elements.fireworksCanvas.height = window.innerHeight;
            let particles = [];
            class Particle {
                constructor(x, y, color) {
                    this.x = x; this.y = y; this.color = color;
                    this.velocity = { x: (Math.random()-0.5)*8, y: (Math.random()-0.5)*12 };
                    this.alpha = 1; this.friction = 0.96; this.gravity = 0.15;
                }
                draw() {
                    ctx.save(); ctx.globalAlpha = this.alpha;
                    ctx.beginPath(); ctx.arc(this.x, this.y, 2, 0, Math.PI*2);
                    ctx.fillStyle = this.color; ctx.fill(); ctx.restore();
                }
                update() {
                    this.velocity.x *= this.friction; this.velocity.y *= this.friction;
                    this.velocity.y += this.gravity;
                    this.x += this.velocity.x; this.y += this.velocity.y;
                    this.alpha -= 0.015;
                }
            }
            function animate() {
                if(elements.fireworksCanvas.style.display === 'none') return;
                requestAnimationFrame(animate);
                ctx.fillStyle = 'rgba(10, 10, 10, 0.15)';
                ctx.fillRect(0, 0, elements.fireworksCanvas.width, elements.fireworksCanvas.height);
                particles.forEach((p, i) => {
                    if (p.alpha > 0) { p.update(); p.draw(); }
                    else { particles.splice(i, 1); }
                });
                if (Math.random() < 0.06) {
                    const x = Math.random()*elements.fireworksCanvas.width;
                    const y = Math.random()*elements.fireworksCanvas.height*0.4;
                    const color = `hsl(${Math.random()*360}, 100%, 65%)`;
                    for(let i=0; i<35; i++) particles.push(new Particle(x, y, color));
                }
            }
            animate();
        }

        window.onresize = () => {
            if(elements.fireworksCanvas.style.display === 'block') {
                elements.fireworksCanvas.width = window.innerWidth;
                elements.fireworksCanvas.height = window.innerHeight;
            }
        };

        // 啟動
        init();
    </script>
</body>
</html>
