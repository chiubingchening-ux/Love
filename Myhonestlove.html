<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>❤️ 我們的專屬時光 ❤️</title>
    
    <link rel="icon" type="image/jpeg" href="https://img.freepik.com/premium-vector/red-love-heart-symbol-hand-drawn-icon_755179-400.jpg">
    <link rel="apple-touch-icon" href="https://img.freepik.com/premium-vector/red-love-heart-symbol-hand-drawn-icon_755179-400.jpg">

    <style>
        /* 字體設定：優先調用華康竹風體 W4 */
        @font-face {
            font-family: 'Bamboo';
            src: local('DFPZhuFeng-W4'), local('華康竹風體W4'), local('DFPZhuFengW4-B5');
        }

        :root {
            --bg: #ffe6e6; --card: rgba(255, 255, 255, 0.95);
            --text: #333; --pink: #ff4d6d; --accent: #ffb3c1;
            --handwriting: 'Bamboo', 'Kaiti TC', 'STKaiti', '標楷體', cursive;
        }
        [data-theme="dark"] {
            --bg: #1a1a1a; --card: rgba(45, 45, 45, 0.95);
            --text: #f0f0f0; --pink: #ff758f; --accent: #ffccd5;
        }

        * { box-sizing: border-box; transition: background 0.3s, color 0.3s; }
        body {
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            background-color: var(--bg); overflow: hidden; font-family: "Microsoft JhengHei", sans-serif;
        }

        /* 頂部選單 */
        #nav-bar { position: fixed; top: 15px; right: 15px; display: flex; gap: 10px; z-index: 1000; }
        .nav-el { background: var(--card); border: 1px solid var(--pink); border-radius: 10px; padding: 5px 10px; color: var(--text); cursor: pointer; }

        /* 計時器側邊欄 */
        #timer-sidebar {
            position: fixed; left: -260px; top: 50%; transform: translateY(-50%);
            width: 200px; background: var(--card); padding: 20px;
            border-radius: 0 20px 20px 0; border: 2px solid var(--pink);
            box-shadow: 5px 0 15px rgba(0,0,0,0.1); z-index: 900;
        }
        #timer-sidebar.active { left: 0; transition: left 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        /* 卡片設計 */
        .card {
            background: var(--card); padding: 40px 30px; border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            text-align: center; z-index: 100; width: 90%; max-width: 380px;
            border: 2.5px solid var(--pink); display: none;
        }
        h1 { color: var(--pink); font-size: 1.4rem; margin-bottom: 25px; }
        
        /* 修正按鈕重疊問題：初始狀態使用 Flex 佈局 */
        .btn-group { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 20px; position: relative; min-height: 60px; width: 100%; }
        .btn { padding: 12px 25px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; font-size: 1.1rem; flex: 1; max-width: 140px; }
        .btn-main { background: var(--pink); color: white; box-shadow: 0 4px 15px rgba(255,77,109,0.3); }
        .btn-gray { background: #ddd; color: #666; }
        
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; background: var(--bg); color: var(--text); text-align: center; }

        /* 浪漫長詩畫面 */
        #poem-screen {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92);
            z-index: 2000; overflow-y: auto; padding: 80px 20px; text-align: center;
        }
        #poem-content {
            font-family: var(--handwriting);
            color: var(--accent);
            font-size: 1.3rem;
            line-height: 2.2;
            letter-spacing: 2px;
            white-space: pre-wrap;
            max-width: 600px;
            margin: 0 auto;
            text-shadow: 0 0 5px rgba(255,180,193,0.5);
        }

        #poem-content::after { content: '|'; animation: blink 1s infinite; margin-left: 5px; }
        @keyframes blink { 50% { opacity: 0; } }

        .heart { position: fixed; color: var(--pink); pointer-events: none; animation: floatUp linear infinite; z-index: 1; }
        @keyframes floatUp { 0% { transform: translateY(110vh) scale(0.5); opacity: 0; } 100% { transform: translateY(-10vh) scale(1.2); opacity: 0; } }
    </style>
</head>
<body data-theme="light">

    <div id="nav-bar">
        <select id="lang-sel" class="nav-el" onchange="switchLang(this.value)">
            <option value="tc">繁體中文</option>
            <option value="en">English</option>
        </select>
        <button class="nav-el" onclick="toggleTheme()">🌓</button>
    </div>

    <div id="timer-sidebar">
        <div style="color:var(--pink); font-weight:bold; margin-bottom:10px;" data-i18n="timeTitle">我們在一起...</div>
        <div id="timer-display" style="line-height:1.8;"></div>
    </div>

    <div id="welcome-box" class="card" style="display: block;">
        <h1 data-i18n="welcome">歡迎來到秘密基地</h1>
        <p style="font-size: 0.9rem; color: var(--text);" data-i18n="intro">您可以設定紀念日來開啟計時器</p>
        <input type="date" id="anniversary-date">
        <button class="btn btn-main" style="max-width: 100%;" onclick="startApp()" data-i18n="enterBtn">進入告白</button>
        <button class="btn" style="color:var(--pink); background:none; text-decoration:underline;" onclick="skipToApp()" data-i18n="skipBtn">訪客模式開始</button>
    </div>

    <div id="gender-box" class="card">
        <h1 data-i18n="genderQ">妳/他是...</h1>
        <div class="btn-group">
            <button class="btn btn-main" style="background:#4a90e2; max-width: 100%;" onclick="setLabel('Gay')" data-i18n="boy">男生</button>
            <button class="btn btn-main" style="max-width: 100%;" onclick="setLabel('T')" data-i18n="girl">女生</button>
        </div>
    </div>

    <div id="pro-box" class="card">
        <h1 data-i18n="proQ">妳願意跟我在一起嗎？</h1>
        <div class="btn-group" id="btn-area">
            <button id="yes-btn" class="btn btn-main" onclick="celebrate()" data-i18n="yes">同意</button>
            <button id="no-btn" class="btn btn-gray" data-i18n="no">不同意</button>
        </div>
    </div>

    <div id="trap-box" class="card">
        <h1 id="trap-text"></h1>
        <button class="btn btn-main" style="max-width: 100%;" onclick="celebrate()" data-i18n="yes">同意</button>
    </div>

    <div id="poem-screen">
        <div id="poem-content"></div>
    </div>

    <script>
        const i18n = {
            tc: {
                welcome: "歡迎來到秘密基地", intro: "您可以設定紀念日來開啟計時器", enterBtn: "保存並進入", skipBtn: "直接開始 (訪客)",
                timeTitle: "我們相愛已經...", genderQ: "妳/他是...", boy: "男生", girl: "女生", proQ: "妳願意跟我在一起嗎？",
                yes: "同意", no: "不同意", sure: "確定嗎？按不同意的就是",
                poem: `親愛的：\n\n今天的陽光格外燦爛，\n因為這一刻，我終於牽起了妳的手。\n\n我們在時光的長河中相遇，\n從陌生到熟悉，從試探到堅定。\n未來的路還很長，\n我願做妳最堅實的港灣，\n為妳擋風遮雨，陪妳看盡星辰。\n\n謝謝妳願意走進我的世界，\n點亮了那些平凡的四季。\n\n這份心意，僅以此百字情書與妳共讀，\n願餘生每一秒，都有妳的溫度。\n\n我愛妳。 ❤️`
            },
            en: {
                welcome: "Welcome to Secret Place", intro: "Set an anniversary to enable timer", enterBtn: "Save & Enter", skipBtn: "Guest Mode",
                timeTitle: "We've been together...", genderQ: "You are a...", boy: "Boy", girl: "Girl", proQ: "Will you stay with me?",
                yes: "Yes", no: "No", sure: "Sure? Clicking No means you're ",
                poem: `Dear Beloved:\n\nThe sun is brighter than ever today,\nBecause at this moment, I finally hold your hand.\n\nWe met in the river of time,\nFrom strangers to soulmates.\nThe road ahead is long,\nI will be your warmest harbor,\nShielding you from rain, watching stars with you.\n\nThank you for walking into my world,\nLighting up my ordinary seasons.\n\nWith this letter, I share my heart with you,\nMay every second of the future be filled with your warmth.\n\nI love you. ❤️`
            }
        };

        let currentLang = 'tc';
        let userLabel = "";
        let moveCount = 0;

        function switchLang(lang) {
            currentLang = lang;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                el.innerText = i18n[lang][key];
            });
            if(document.getElementById('trap-box').style.display === 'block') {
                document.getElementById('trap-text').innerText = i18n[currentLang].sure + " " + userLabel;
            }
        }

        function startApp() {
            const date = document.getElementById('anniversary-date').value;
            if(date) {
                localStorage.setItem('ourDate', date);
                startTimer();
            }
            document.getElementById('welcome-box').style.display = 'none';
            document.getElementById('gender-box').style.display = 'block';
        }

        function skipToApp() {
            document.getElementById('welcome-box').style.display = 'none';
            document.getElementById('gender-box').style.display = 'block';
        }

        function setLabel(l) {
            userLabel = l;
            document.getElementById('gender-box').style.display = 'none';
            document.getElementById('pro-box').style.display = 'block';
        }

        const noBtn = document.getElementById('no-btn');
        function moveNo() {
            if (moveCount > 5) {
                document.getElementById('pro-box').style.display = 'none';
                document.getElementById('trap-text').innerText = i18n[currentLang].sure + " " + userLabel;
                document.getElementById('trap-box').style.display = 'block';
                return;
            }
            const pad = 60;
            const maxX = window.innerWidth - noBtn.offsetWidth - pad;
            const maxY = window.innerHeight - noBtn.offsetHeight - pad;
            noBtn.style.position = 'fixed';
            noBtn.style.left = Math.max(pad, Math.random() * maxX) + 'px';
            noBtn.style.top = Math.max(pad, Math.random() * maxY) + 'px';
            moveCount++;
        }

        noBtn.addEventListener('mouseenter', moveNo);
        noBtn.addEventListener('touchstart', (e) => { e.preventDefault(); moveNo(); });

        function startTimer() {
            const sidebar = document.getElementById('timer-sidebar');
            sidebar.style.display = 'block';
            setTimeout(() => sidebar.classList.add('active'), 100);
            setInterval(() => {
                const start = new Date(localStorage.getItem('ourDate'));
                const now = new Date();
                const diff = now - start;
                const d = Math.floor(diff / 86400000);
                const h = Math.floor((diff % 86400000) / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                document.getElementById('timer-display').innerHTML = `${d}天 ${h}時<br>${m}分 ${s}秒`;
            }, 1000);
        }

        function celebrate() {
            document.querySelectorAll('.card').forEach(c => c.style.display = 'none');
            document.getElementById('nav-bar').style.display = 'none';
            const sidebar = document.getElementById('timer-sidebar');
            if(sidebar.style.display === 'block') sidebar.style.zIndex = "3000";
            
            document.getElementById('poem-screen').style.display = 'block';
            const content = i18n[currentLang].poem;
            const container = document.getElementById('poem-content');
            let index = 0;

            function typeWriter() {
                if (index < content.length) {
                    container.innerHTML += content.charAt(index);
                    index++;
                    document.getElementById('poem-screen').scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
                    setTimeout(typeWriter, Math.random() * 80 + 40);
                }
            }
            typeWriter();
        }

        function toggleTheme() {
            const b = document.body;
            b.setAttribute('data-theme', b.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        }

        setInterval(() => {
            const h = document.createElement('div');
            h.className = 'heart'; h.innerHTML = '❤️';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.fontSize = (Math.random() * 15 + 10) + 'px';
            h.style.animationDuration = (Math.random() * 3 + 4) + 's';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 5000);
        }, 600);
    </script>
</body>
</html>
